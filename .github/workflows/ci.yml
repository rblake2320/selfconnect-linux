# CUDA tests (test_cuda_ipc.py) are skipped on CI — they require a physical NVIDIA GPU. Run locally on DGX Spark.

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # Headless (no-GPU) CI — CUDA tests are handled separately on DGX Spark hardware.
  # AT-SPI and X11 tests are also skipped here (no display); they use pytest.skip() gracefully.
  test:
    name: Python ${{ matrix.python-version }} on Linux
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and dependencies
        run: pip install -e ".[dev]"

      - name: Install ruff
        run: pip install ruff

      - name: Lint with ruff
        run: ruff check self_connect_linux/ tests/

      - name: Syntax check (all .py files)
        run: find self_connect_linux -name "*.py" | xargs python -m py_compile

      - name: Import smoke test (all public symbols)
        run: |
          python -c "
          import self_connect_linux as sc
          assert sc.__version__, 'missing __version__'
          print('version:', sc.__version__)
          assert hasattr(sc, 'ProvenanceLedger'), 'missing ProvenanceLedger'
          assert hasattr(sc, 'BrokerServer'), 'missing BrokerServer'
          assert hasattr(sc, 'CudaIpcBuffer'), 'missing CudaIpcBuffer'
          print('all public symbols present')
          "

      - name: Install benchmark dependency
        run: pip install pytest-benchmark

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ -v --tb=short \
            --ignore=tests/test_benchmarks.py \
            --cov=self_connect_linux \
            --cov-report=term-missing \
            --cov-fail-under=80
